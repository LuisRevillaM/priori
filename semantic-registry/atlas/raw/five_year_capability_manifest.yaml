  - id: possession_progression_rate
    definition: Measures longitudinal gain per active second.
    output_type: scalar_value
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: possession_directness
    definition: Compares net progress with total ball travel and action count.
    output_type: scalar_value
    semantic_tier: DETERMINISTIC
