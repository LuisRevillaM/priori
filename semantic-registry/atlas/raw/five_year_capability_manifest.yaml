- id: temporal_logic_and_aggregation
  title: Temporal logic, set operations, and aggregation
  purpose: Let Hermes compose tactical situations declaratively without inventing hidden procedural code.
  default_modalities:
  - any
  capabilities:
  - id: at
    definition: Evaluates a value at an anchor or timestamp.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: during
    definition: Restricts a value or relation to an episode.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: before
    definition: Tests strict temporal precedence with optional maximum gap.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: after
    definition: Tests strict temporal succession with optional maximum gap.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: meets
    definition: Tests whether one episode ends where another begins within tolerance.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: overlaps
    definition: Tests whether episodes share nonzero time.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: starts_with
    definition: Tests whether episodes share a start boundary within tolerance.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: finishes_with
    definition: Tests whether episodes share an end boundary within tolerance.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: contains
    definition: Tests whether one episode temporally contains another.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: within
    definition: Tests whether an anchor or episode lies within a declared horizon of another.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: followed_by
    definition: Creates ordered sequence matches under gap and continuity constraints.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: preceded_by
    definition: Creates reverse ordered sequence matches under gap and continuity constraints.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: until
    definition: Requires a condition to hold until a terminating condition occurs.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: since
    definition: Requires a condition to have held since a starting condition.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: cooccurs_with
    definition: Tests simultaneous or near-simultaneous conditions.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: persists_for
    definition: Requires continuous truth for a minimum duration while preserving unknown intervals.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: persists_for_total
    definition: Requires cumulative truth duration within a window.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: dwell_time
    definition: Measures duration of relation or region membership.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: gap_tolerant_persistence
    definition: Bridges short false or missing gaps under an explicit tolerance policy.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: hysteresis_episode
    definition: Creates stable episodes using different enter and exit thresholds.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: debounce
    definition: Suppresses short-lived state changes below a declared duration.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: rising_edge
    definition: Returns transition anchors where a scalar or probability crosses upward.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: falling_edge
    definition: Returns transition anchors where a scalar or probability crosses downward.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: state_change
    definition: Returns anchors where a categorical state changes.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: change_point
    definition: Returns likely boundaries between temporal regimes.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: local_maximum
    definition: Returns local maxima under scale and prominence constraints.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: local_minimum
    definition: Returns local minima under scale and prominence constraints.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: delta
    definition: Computes end-minus-start or anchor-relative change.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: delta_from_baseline
