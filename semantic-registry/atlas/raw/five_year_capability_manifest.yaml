- id: reference_frames_and_regions
  title: Reference frames and dynamic football regions
  purpose: Make every spatial statement explicit about perspective and allow regions to move with the game.
  default_modalities:
  - tracking
  - match_sheet
  capabilities:
  - id: absolute_pitch_frame
    definition: Uses provider-normalized pitch coordinates with declared origin and units.
    output_type: coordinate_frame
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: attacking_team_frame
    definition: Normalizes the longitudinal axis so the selected team always attacks positively.
    output_type: coordinate_frame
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: defending_team_frame
    definition: Normalizes coordinates from the selected defending team's perspective.
    output_type: coordinate_frame
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: ball_relative_frame
    definition: Defines coordinates relative to the current ball position and team perspective.
    output_type: coordinate_frame_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: actor_relative_frame
    definition: Defines coordinates relative to an actor and an available orientation axis.
    output_type: coordinate_frame_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: goal_relative_frame
    definition: Defines radial and angular coordinates relative to a selected goal.
    output_type: coordinate_frame_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: unit_relative_frame
    definition: Defines coordinates relative to an inferred team unit or line.
    output_type: coordinate_frame_signal
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: static_pitch_zone
    definition: Returns standard or user-defined fixed pitch regions.
    output_type: region_value
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: pitch_third_region
    definition: Returns defensive, middle, or attacking thirds under attacking orientation.
    output_type: region_value
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: vertical_channel_region
    definition: Returns central, half-space, or wide channels under a declared partition.
    output_type: region_value
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: penalty_area_region
    definition: Returns the law-defined penalty area for a selected goal.
    output_type: region_value
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: zone_14_region
    definition: Returns a parameterized central area outside the penalty box.
    output_type: region_value
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: cutback_region
    definition: Returns a parameterized high-value destination region for cutbacks.
    output_type: region_value
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: goal_corridor_region
    definition: Returns the channel between a point and the visible goal mouth.
    output_type: region_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: ball_side_region
    definition: Returns the current lateral half or channel containing the ball.
    output_type: region_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: weak_side_region
    definition: Returns the lateral region opposite the ball under team perspective.
    output_type: region_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: team_shape_interior
    definition: Returns the current interior of a team or unit shape.
    output_type: region_signal
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: between_units_region
    definition: Returns the dynamic band between two inferred opposition units.
    output_type: region_signal
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: behind_unit_region
    definition: Returns space beyond an inferred unit toward its defended goal.
    output_type: region_signal
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: outside_team_shape_region
    definition: Returns space laterally or longitudinally outside an inferred team shape.
    output_type: region_signal
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: rest_defense_region
    definition: Returns the zone occupied or protected by players retained behind the attack.
    output_type: region_signal
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: custom_dynamic_region
    definition: Builds a region from typed geometry, entities, lines, offsets, and Boolean operations.
    output_type: region_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: region_membership
    definition: Returns inside, boundary, outside, or unknown for entities relative to a region.
    output_type: relation_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: region_dwell_episode
    definition: Bounds intervals of continuous occupancy with configurable gap tolerance.
    output_type: relation_episode_set
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: region_entry
    definition: Finds outside-to-inside transitions.
    output_type: anchor_set
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: region_exit
    definition: Finds inside-to-outside transitions.
    output_type: anchor_set
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: region_arrival
    definition: Finds first stable occupancy after approach, not merely a one-frame crossing.
    output_type: anchor_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: region_vacation
    definition: Finds stable departure that creates previously occupied space.
    output_type: anchor_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
- id: reachability_and_space_control
  title: Reachability, interception, space control, and spatial value
  purpose: Represent not only where players are, but where they can arrive first and how that changes.
  default_modalities:
  - tracking
  capabilities:
  - id: time_to_location
    definition: Estimates an entity's arrival-time distribution to a target point.
    output_type: distribution_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: time_to_moving_target
    definition: Estimates arrival time to another moving entity or ball trajectory.
    output_type: distribution_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: time_to_intercept_ball
    definition: Estimates whether and when a player can intercept the projected ball path.
    output_type: distribution_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: arrival_time_field
    definition: Returns estimated player or team arrival time over the pitch.
    output_type: field_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: player_reachability_region
    definition: Returns locations reachable by a player within a declared horizon.
    output_type: region_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: team_reachability_region
    definition: Returns locations reachable by at least one team member within a horizon.
    output_type: region_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: interception_margin
    definition: Measures receiver arrival time minus best-opponent arrival time at a target.
    output_type: frame_or_relation_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: control_probability_field
    definition: Returns calibrated probability that each team controls the ball if it arrives at each location.
    output_type: field_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: pitch_control_field
    definition: Returns team control balance across the pitch under a declared reachability model.
    output_type: field_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: dominant_control_region
    definition: Returns regions where one team exceeds a declared control margin.
    output_type: region_set_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: controlled_area
    definition: Measures area under a team's control threshold.
    output_type: frame_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: local_control_margin
    definition: Measures control advantage at a point, player, or region.
    output_type: frame_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: free_space_field
    definition: Returns opponent-distance or reachability-derived free-space magnitude over the pitch.
    output_type: field_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: available_space_region
    definition: Returns connected regions that meet size, control, and access criteria.
    output_type: region_set_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: available_space_episode
    definition: Bounds persistence of an available region or relation.
    output_type: relation_episode_set
    semantic_tier: MODELLED
    status: PROPOSED
  - id: space_opening_rate
    definition: Measures positive change in available, controlled, or unoccupied space.
    output_type: frame_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: space_closing_rate
    definition: Measures negative change in available, controlled, or unoccupied space.
    output_type: frame_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: space_accessibility
    definition: Measures whether a teammate can reach and receive in a region before opponents.
    output_type: relation_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: occupied_space_value
    definition: Measures value of space currently controlled or occupied by an actor.
    output_type: frame_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: generated_space_value
    definition: Measures teammate-benefiting space increase associated with an actor's movement.
    output_type: frame_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: closed_space_value
    definition: Measures opponent-benefiting space removed by an actor's movement.
    output_type: frame_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: space_transfer
    definition: Measures movement of controlled or valuable space from one region to another.
    output_type: relation_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: space_creation_candidate
    definition: Finds movement episodes associated with meaningful space gain for self or teammates.
    output_type: relation_episode_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: space_denial_candidate
    definition: Finds movement episodes associated with meaningful loss of opponent-accessible space.
    output_type: relation_episode_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: space_exploitation_candidate
    definition: Finds entries or receptions into recently opened valuable space.
    output_type: relation_episode_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
