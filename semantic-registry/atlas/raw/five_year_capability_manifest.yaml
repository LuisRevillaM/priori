    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: join_by_episode
    definition: Joins outputs sharing or overlapping a canonical episode.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: map_entities
