    status: PROPOSED
  - id: behind_ball_relation
    definition: Tests whether an entity is behind the ball in attacking coordinates.
    output_type: relation_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: between_relation
    definition: Measures whether an entity lies spatially between two entities, lines, or regions.
