    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: filter_entities
    definition: Selects entities satisfying a typed predicate.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: group_by_entity
    definition: Groups evaluations by player, team, role, or unit.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: group_by_possession
    definition: Groups outputs by possession sequence.
    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
  - id: union
