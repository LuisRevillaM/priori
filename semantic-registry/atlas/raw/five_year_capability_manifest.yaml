    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: inter_unit_gap
    definition: Measures space between adjacent opposition units.
    output_type: region_signal
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: gap_width
    definition: Measures lateral or path-normal width of a selected gap.
    output_type: frame_signal
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: gap_depth
    definition: Measures longitudinal depth of a selected gap region.
    output_type: frame_signal
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: gap_control_margin
    definition: Measures attacking-versus-defending reachability within a gap.
    output_type: frame_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: gap_opening_episode
    definition: Bounds meaningful increase in a selected gap's size or accessibility.
    output_type: relation_episode_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: gap_closing_episode
    definition: Bounds meaningful decrease in a selected gap's size or accessibility.
    output_type: relation_episode_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: gap_exploitation_episode
