    output_type: operator
    semantic_tier: OPERATOR
    status: PROPOSED
- id: interaction_graphs
  title: Dynamic graphs and interaction structure
  purpose: Represent multi-player dependencies that are awkward as isolated pairwise measurements.
  default_modalities:
  - tracking
  - events
  capabilities:
  - id: proximity_graph
    definition: Builds a dynamic graph from spatial-neighbor relations.
    output_type: graph_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: reachability_graph
    definition: Builds directed edges weighted by arrival-time or control margin.
    output_type: graph_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: passing_option_graph
    definition: Builds directed edges for accessible candidate passes.
    output_type: graph_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: actual_pass_graph
    definition: Builds possession- or match-level graphs from reconstructed passes.
    output_type: graph_value
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: marking_graph
    definition: Builds probable defender-attacker assignment edges.
    output_type: graph_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: pressure_graph
    definition: Builds defender-to-attacker or defender-to-ball pressure edges.
    output_type: graph_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: support_graph
    definition: Builds teammate support edges weighted by access quality.
    output_type: graph_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: space_dependency_graph
    definition: Links movements to defenders displaced, spaces changed, and teammates benefiting.
    output_type: graph_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: graph_connected_component
    definition: Returns connected player groups under a declared relation graph.
    output_type: entity_set_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: graph_centrality
    definition: Returns typed centrality measures with graph and time context.
    output_type: frame_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: graph_betweenness_option
    definition: Measures whether a player connects otherwise weakly connected passing regions.
    output_type: frame_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: graph_edge_opening
    definition: Finds a relation edge becoming materially available.
    output_type: relation_episode_set
    semantic_tier: MODELLED
    status: PROPOSED
  - id: graph_edge_closing
    definition: Finds a relation edge becoming materially unavailable.
    output_type: relation_episode_set
    semantic_tier: MODELLED
    status: PROPOSED
  - id: network_rewiring_episode
    definition: Finds substantial change in team interaction graph structure.
    output_type: episode_set
    semantic_tier: MODELLED
    status: PROPOSED
  - id: passing_network_motif
    definition: Finds recurring small pass-graph patterns.
    output_type: sequence_set
    semantic_tier: MODELLED
    status: PROPOSED
  - id: movement_coordination_motif
    definition: Finds recurring multi-player trajectory relation patterns.
    output_type: sequence_set
    semantic_tier: MODELLED
    status: PROPOSED
  - id: defensive_assignment_switch
    definition: Finds likely changes in marking or coverage responsibility.
    output_type: relation_episode_set
    semantic_tier: MODELLED
    status: PROPOSED
  - id: team_graph_signature
    definition: Returns a versioned embedding of a team's interaction structure.
    output_type: embedding_signal
    semantic_tier: MODELLED
    status: PROPOSED
- id: outcomes_and_continuity
  title: Outcomes, continuation, and consequences
  purpose: Describe what measurably happened after an anchor without smuggling in causal or optimality claims.
  default_modalities:
  - tracking
  - events
  capabilities:
  - id: same_team_control_after
    definition: Tests whether the perspective team controls the ball after a declared horizon.
    output_type: evaluation_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: same_player_control_after
    definition: Tests whether the same player retains control after a declared horizon.
    output_type: evaluation_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: possession_retained_for
    definition: Tests whether team possession persists for a declared duration.
    output_type: evaluation_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: territorial_gain_after
    definition: Measures ball-territory change after an anchor.
    output_type: evaluation_set
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: space_gain_after
    definition: Measures available or controlled space change after an anchor.
    output_type: evaluation_set
    semantic_tier: MODELLED
    status: PROPOSED
  - id: pressure_change_after
    definition: Measures pressure change after an anchor.
    output_type: evaluation_set
    semantic_tier: MODELLED
    status: PROPOSED
  - id: shape_change_after
    definition: Measures team or unit structural change after an anchor.
    output_type: evaluation_set
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: option_count_change_after
    definition: Measures accessible receiving-option change after an anchor.
    output_type: evaluation_set
    semantic_tier: MODELLED
    status: PROPOSED
  - id: line_state_change_after
    definition: Measures line crossing, displacement, or recovery after an anchor.
    output_type: evaluation_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: shot_within
    definition: Tests whether a shot occurs within a declared horizon and continuity policy.
    output_type: evaluation_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: box_entry_within
    definition: Tests whether controlled ball entry into the box occurs within a horizon.
    output_type: evaluation_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: final_third_entry_within
    definition: Tests whether controlled final-third entry occurs within a horizon.
    output_type: evaluation_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: turnover_within
    definition: Tests whether team control is lost within a declared horizon.
    output_type: evaluation_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: foul_won_within
    definition: Tests whether a provider or reconstructed foul occurs within a horizon.
    output_type: evaluation_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: restart_won_within
    definition: Tests whether the action leads to a team restart within a horizon.
    output_type: evaluation_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: continuation_state
    definition: Classifies controlled continuation, recycle, transition, terminal event, or unknown.
    output_type: enum_value
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: outcome_horizon_bundle
    definition: Returns multiple factual outcomes across several declared horizons.
    output_type: evaluation_set
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: association_not_causation_record
    definition: Marks downstream changes as temporally associated unless a causal design is declared.
    output_type: evidence_record
    semantic_tier: EVIDENCE
    status: PROPOSED
- id: learned_value_and_counterfactuals
  title: Learned probability, value, and counterfactual models
  purpose: Keep model-dependent claims isolated, calibrated, versioned, and distinguishable from observed facts.
  default_modalities:
  - tracking
  - events
  - trained_model
  capabilities:
  - id: expected_goals
    definition: Returns calibrated goal probability for a shot under a versioned model.
    output_type: distribution_value
    semantic_tier: MODELLED
    status: PROPOSED
  - id: expected_pass_completion
    definition: Returns calibrated completion probability for a candidate or actual pass.
    output_type: distribution_value
    semantic_tier: MODELLED
    status: PROPOSED
  - id: expected_possession_retention
    definition: Returns probability of retaining team control over a declared horizon.
    output_type: distribution_value
    semantic_tier: MODELLED
    status: PROPOSED
  - id: expected_progression
    definition: Returns probability or expected distance of future territorial progression.
    output_type: distribution_value
    semantic_tier: MODELLED
    status: PROPOSED
  - id: expected_final_third_entry
    definition: Returns probability of controlled final-third entry within a horizon.
    output_type: distribution_value
    semantic_tier: MODELLED
    status: PROPOSED
  - id: expected_box_entry
    definition: Returns probability of controlled box entry within a horizon.
    output_type: distribution_value
    semantic_tier: MODELLED
    status: PROPOSED
  - id: expected_shot_creation
    definition: Returns probability of creating a shot within a horizon.
    output_type: distribution_value
    semantic_tier: MODELLED
    status: PROPOSED
  - id: expected_goal_concession
    definition: Returns probability of conceding within a horizon.
    output_type: distribution_value
    semantic_tier: MODELLED
    status: PROPOSED
  - id: expected_threat
    definition: Returns versioned possession-state threat value.
    output_type: frame_or_action_value
    semantic_tier: MODELLED
    status: PROPOSED
  - id: expected_possession_value
    definition: Returns versioned expected possession outcome value.
    output_type: frame_or_action_value
    semantic_tier: MODELLED
    status: PROPOSED
  - id: action_value
    definition: Returns modelled value change across an observed action.
    output_type: scalar_value
    semantic_tier: MODELLED
    status: PROPOSED
  - id: off_ball_action_value
    definition: Returns modelled value associated with an observed off-ball movement.
    output_type: scalar_value
    semantic_tier: MODELLED
    status: PROPOSED
  - id: space_value_field
    definition: Returns spatial distribution of modelled future value.
    output_type: field_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: counterfactual_pass_option_set
    definition: Returns feasible alternative pass targets under declared physical assumptions.
    output_type: candidate_set
    semantic_tier: MODELLED
    status: PROPOSED
  - id: counterfactual_carry_option_set
    definition: Returns feasible alternative carry trajectories.
    output_type: candidate_set
    semantic_tier: MODELLED
    status: PROPOSED
  - id: counterfactual_movement_set
    definition: Returns feasible alternative off-ball trajectories under a declared motion model.
    output_type: candidate_set
    semantic_tier: MODELLED
    status: PROPOSED
  - id: counterfactual_state_rollout
    definition: Returns simulated future state distributions under a candidate action.
    output_type: trajectory_distribution
    semantic_tier: MODELLED
    status: PROPOSED
  - id: expected_regret
    definition: Compares observed action value with feasible alternatives under one model.
    output_type: distribution_value
    semantic_tier: MODELLED
    status: PROPOSED
  - id: decision_quality_model
    definition: Returns a model-relative assessment only when alternatives, calibration, and domain validity are
      declared.
    output_type: evaluation_set
    semantic_tier: MODELLED
    status: PROPOSED
  - id: trajectory_likelihood
    definition: Measures likelihood of an observed movement under a learned behavior model.
    output_type: frame_or_episode_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: behavior_novelty
    definition: Measures deviation from learned team, role, or league behavior distributions.
    output_type: scalar_value
    semantic_tier: MODELLED
    status: PROPOSED
  - id: opponent_response_model
    definition: Predicts defensive response distributions to candidate ball or player movement.
    output_type: trajectory_distribution
    semantic_tier: MODELLED
    status: PROPOSED
  - id: team_style_embedding
    definition: Returns a versioned representation of recurrent team behavior.
    output_type: embedding_value
    semantic_tier: MODELLED
    status: PROPOSED
  - id: model_domain_validity
    definition: Checks whether match, competition, data modality, and feature ranges fit model training scope.
    output_type: evaluation_set
    semantic_tier: EVIDENCE
    status: PROPOSED
  - id: model_calibration_record
    definition: Carries calibration metrics, uncertainty intervals, training period, and population.
    output_type: evidence_record
    semantic_tier: EVIDENCE
    status: PROPOSED
  - id: counterfactual_assumption_record
    definition: Carries physical, behavioral, and causal assumptions behind every alternative.
    output_type: evidence_record
    semantic_tier: EVIDENCE
    status: PROPOSED
- id: evidence_replay_and_validation
  title: Evidence, replay, tests, and capability governance
  purpose: Make every result inspectable, reproducible, versioned, and honest about what cannot be known.
  default_modalities:
  - any
  capabilities:
  - id: evidence_frame_set
    definition: Returns exact witness, boundary, baseline, and failure frames for an evaluation.
    output_type: frame_set
    semantic_tier: EVIDENCE
    status: PROPOSED
  - id: evidence_entity_set
    definition: Returns all involved, expected, missing, and excluded entities.
    output_type: entity_set_value
    semantic_tier: EVIDENCE
    status: PROPOSED
  - id: evidence_geometry
    definition: Returns exact points, paths, lines, regions, fields, and graph edges supporting a claim.
    output_type: geometry_bundle
    semantic_tier: EVIDENCE
    status: PROPOSED
  - id: evidence_measurements
    definition: Returns measured values, units, uncertainty, and thresholds used.
    output_type: record_value
    semantic_tier: EVIDENCE
    status: PROPOSED
  - id: predicate_trace
    definition: Returns each predicate's PASS, FAIL, or UNKNOWN state and reason.
    output_type: trace_value
    semantic_tier: EVIDENCE
    status: PROPOSED
  - id: capability_trace
    definition: Returns capability versions, parameters, inputs, outputs, and quality state.
    output_type: trace_value
    semantic_tier: EVIDENCE
    status: PROPOSED
  - id: provenance_trace
    definition: Returns author, recipe, binder, engine, data, model, and schema versions.
    output_type: trace_value
    semantic_tier: EVIDENCE
    status: PROPOSED
  - id: unknown_reason
    definition: Returns typed reason codes for indeterminate results.
    output_type: enum_value
    semantic_tier: EVIDENCE
    status: PROPOSED
  - id: degradation_reason
    definition: Returns typed reason codes for results produced with degraded evidence.
    output_type: enum_value
    semantic_tier: EVIDENCE
    status: PROPOSED
  - id: conflict_record
    definition: Returns contradictory source facts or incompatible hypotheses.
    output_type: record_value
    semantic_tier: EVIDENCE
    status: PROPOSED
  - id: replay_window
    definition: Returns the exact time window required to inspect a result.
    output_type: episode_value
    semantic_tier: EVIDENCE
    status: PROPOSED
  - id: replay_overlay_bundle
    definition: Returns only evidence-backed overlays and explicitly unavailable overlays.
    output_type: geometry_bundle
    semantic_tier: EVIDENCE
    status: PROPOSED
  - id: result_identity
    definition: Computes deterministic identity from plan, scope, data, engine, and model versions.
    output_type: identifier_value
    semantic_tier: EVIDENCE
    status: PROPOSED
  - id: capability_contract
    definition: Declares typed inputs, outputs, units, frames, semantics, limitations, and authoring tier.
    output_type: schema_value
    semantic_tier: EVIDENCE
    status: PROPOSED
  - id: capability_invariant_test
    definition: Runs provider-independent mathematical and football invariants.
    output_type: test_result_set
    semantic_tier: EVIDENCE
    status: PROPOSED
  - id: synthetic_scenario_test
    definition: Runs a capability against controlled synthetic trajectories with known truth.
    output_type: test_result_set
    semantic_tier: EVIDENCE
    status: PROPOSED
  - id: gold_clip_test
    definition: Compares results with reviewed video or expert annotations when available.
    output_type: test_result_set
    semantic_tier: EVIDENCE
    status: PROPOSED
  - id: cross_provider_conformance_test
    definition: Checks equivalent behavior after ingestion from different providers.
    output_type: test_result_set
    semantic_tier: EVIDENCE
    status: PROPOSED
  - id: parameter_sensitivity_report
    definition: Reports how outputs change across allowed parameter ranges.
    output_type: report_value
    semantic_tier: EVIDENCE
    status: PROPOSED
  - id: boundary_stability_report
    definition: Reports timing and classification sensitivity near episode boundaries.
    output_type: report_value
    semantic_tier: EVIDENCE
    status: PROPOSED
  - id: performance_budget
    definition: Declares expected compute, memory, scope, and degradation behavior.
    output_type: record_value
    semantic_tier: EVIDENCE
    status: PROPOSED
  - id: modality_requirement
    definition: Declares required and optional modalities, sampling rates, and fields.
    output_type: schema_value
    semantic_tier: EVIDENCE
    status: PROPOSED
  - id: semantic_claim_level
    definition: Labels outputs as observed, deterministic, inferred candidate, modelled, or interpreted.
    output_type: enum_value
    semantic_tier: EVIDENCE
    status: PROPOSED
  - id: authorability_policy
    definition: Declares compiler lowering, agent composable, trusted recipe, or user tactical visibility.
    output_type: enum_value
    semantic_tier: EVIDENCE
    status: PROPOSED
  - id: deprecation_and_migration
    definition: Declares replacement capability and compatibility policy for retired versions.
    output_type: record_value
    semantic_tier: EVIDENCE
    status: PROPOSED
  - id: catalog_gap_record
    definition: Returns a typed statement of which missing primitives prevent a requested query.
    output_type: record_value
    semantic_tier: EVIDENCE
    status: PROPOSED
