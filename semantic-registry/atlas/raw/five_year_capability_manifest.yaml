catalog_id: priori.soccer.standard_library
catalog_version: 0.1.0-concept
snapshot_date: '2026-06-23'
status: PROPOSAL
declaration_count: 741
family_count: 26
north_star: A rich typed football algebra over a small audited runtime kernel.
semantic_tiers:
  OBSERVATION: Provider or canonical source fact.
  DETERMINISTIC: Reproducible derivation from declared inputs.
  INFERRED_CANDIDATE: Evidence-backed interpretation that does not claim intention.
  MODELLED: Probabilistic, learned, value, or counterfactual output.
  OPERATOR: Typed composition or temporal/set operator.
  EVIDENCE: Provenance, replay, validation, or governance output.
truth_model:
  predicate_truth:
  - PASS
  - FAIL
  - UNKNOWN
  evaluation_disposition:
  - EVALUATED
  - NOT_APPLICABLE
  - CONFLICT
  data_quality:
  - VALID
  - DEGRADED
  - INSUFFICIENT
  semantic_basis:
  - OBSERVED
  - DERIVED
  - INFERRED_CANDIDATE
  - MODELLED
runtime_types:
- type: Scalar<T>
  definition: A unit-bearing atomic value.
- type: Signal<T>
  definition: A value indexed by canonical match time or frame.
- type: Point / Vector / Transform
  definition: Geometry with explicit coordinate and reference frames.
- type: Trajectory
  definition: Time-indexed entity or ball path with uncertainty.
- type: EntitySet / OrderedEntitySet
  definition: Typed actors, including expected, observed, missing, and excluded membership.
- type: Region / RegionSet
  definition: Static or dynamic spatial areas.
- type: Line / Curve
  definition: Ordered structural boundaries such as units and offside lines.
- type: Field<T>
  definition: A scalar, vector, probability, control, pressure, or value surface over the pitch.
- type: Graph
  definition: Dynamic nodes and typed interaction edges.
- type: Distribution<T>
  definition: Calibrated alternatives or uncertain values, never collapsed prematurely.
- type: Anchor / AnchorSet
  definition: Reference moments with boundary and alignment uncertainty.
- type: Episode / EpisodeSet
  definition: Bounded intervals with start/end semantics.
- type: RelationEpisodeSet
  definition: A typed relation among entities or regions over time.
- type: SequenceSet
  definition: Ordered episodes and relations with continuity constraints.
- type: CandidateSet
  definition: Ranked competing hypotheses with evidence.
- type: EvaluationSet
  definition: Per-anchor truth, quality, coverage, reasons, and witnesses.
- type: UncertaintyEnvelope
  definition: Spatial, temporal, identity, model, and boundary uncertainty.
- type: EvidenceBundle
  definition: Frames, entities, geometry, measurements, traces, provenance, and replay.
capability_contract_fields:
- stable id and semantic version
- 'semantic claim level: OBSERVATION | DETERMINISTIC | INFERRED_CANDIDATE | MODELLED'
- 'authorability: COMPILER_LOWERING | AGENT_COMPOSABLE | TRUSTED_RECIPE_ONLY | USER_TACTICAL'
- typed inputs and outputs
- units, coordinate frame, perspective, and entity scope
- temporal anchor, boundary, continuity, and resampling semantics
- required and optional data modalities
- parameter schema, allowed bounds, and system-owned defaults
- coverage denominator and active-player policy
- uncertainty propagation and alternative-hypothesis policy
- predicate truth policy and typed UNKNOWN reasons
- evidence fields and replay overlays
- limitations and prohibited claims
- mathematical invariants, synthetic tests, gold examples, and cross-provider conformance
- performance budget, caching behavior, and deterministic result identity
- deprecation and migration policy
implementation_kernels:
- entity selection and active-membership resolution
- coordinate/reference-frame transformation
- signal smoothing, differentiation, and uncertainty propagation
- point, line, region, corridor, and field geometry
- dynamic-region construction and Boolean geometry
- reachability / time-to-intercept inference
- state inference with multiple hypotheses
- transition and change-point detection
- episode extraction with hysteresis and gap tolerance
- typed entity and relation joins
- dynamic graph construction
- temporal interval algebra and sequence matching
- aggregation with coverage-aware denominators
- tri-state thresholding
- learned-model inference with domain checks
- evidence projection and deterministic result identity
families:
- id: data_quality
  title: Data quality, synchronization, and provenance
  purpose: Make every downstream claim conditional on what was actually observed, aligned, and trustworthy.
  default_modalities:
  - tracking
  - events
  - match_sheet
  capabilities:
  - id: tracking_presence
    definition: Reports whether each required entity is observed at each frame.
    output_type: entity_set_signal
    semantic_tier: OBSERVATION
    status: PROPOSED
  - id: tracking_coverage_ratio
    definition: Measures observed-frame coverage for an entity, set, or episode.
    output_type: scalar_or_frame_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: sample_gap_episode
    definition: Finds contiguous gaps in the expected tracking sample stream.
    output_type: episode_set
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: irregular_sampling_signal
    definition: Measures deviation from the declared frame interval.
    output_type: frame_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: coordinate_outlier_candidate
    definition: Flags implausible positions, jumps, or off-pitch coordinates without silently correcting them.
    output_type: evaluation_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: kinematic_outlier_candidate
    definition: Flags implausible speed, acceleration, jerk, or turn-rate observations.
    output_type: evaluation_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: identity_swap_candidate
    definition: Detects trajectory discontinuities consistent with two tracked identities being swapped.
    output_type: relation_episode_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: ball_track_quality
    definition: Summarizes ball visibility, continuity, height reliability, and physical plausibility.
    output_type: evaluation_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: pitch_calibration_quality
    definition: Measures whether coordinate extents and landmark geometry agree with declared pitch dimensions.
    output_type: evaluation_set
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: event_tracking_alignment_candidate
    definition: Returns ranked physical frame candidates for a provider event.
    output_type: candidate_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: event_tracking_alignment_confidence
    definition: Quantifies confidence and ambiguity in an event-to-tracking alignment.
    output_type: distribution_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: clock_offset_estimate
    definition: Estimates local event-to-tracking clock offset over a declared interval.
    output_type: frame_or_episode_signal
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: clock_drift_estimate
    definition: Estimates changing clock offset rather than assuming one constant shift.
    output_type: frame_signal
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: provider_event_conflict
    definition: Identifies contradictions between event labels, tracking evidence, and match state.
    output_type: evaluation_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: interpolation_mask
    definition: Records exactly which values were interpolated and by which method.
    output_type: entity_set_signal
    semantic_tier: OBSERVATION
    status: PROPOSED
  - id: smoothing_provenance
    definition: Records filter method, parameters, input rate, and boundary handling for derived kinematics.
    output_type: evidence_record
    semantic_tier: EVIDENCE
    status: PROPOSED
  - id: source_provenance
    definition: Carries provider, file, schema version, ingestion version, and source record identifiers.
    output_type: evidence_record
    semantic_tier: EVIDENCE
    status: PROPOSED
  - id: measurement_uncertainty
    definition: Attaches position, time, and derived-value uncertainty to any runtime value.
    output_type: uncertainty_envelope
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: required_entity_coverage
    definition: Checks whether all entities required by a capability are present for its full evaluation window.
    output_type: evaluation_set
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: quality_reason_histogram
    definition: Aggregates missingness, degradation, conflict, and failure reasons over a query scope.
    output_type: table_value
    semantic_tier: EVIDENCE
    status: PROPOSED
- id: match_context
  title: Match clock, laws, and contextual state
  purpose: Represent the game context that changes the meaning of otherwise identical spatial patterns.
  default_modalities:
  - tracking
  - events
  - match_sheet
  capabilities:
  - id: period_episode
    definition: Returns canonical first-half, second-half, extra-time, and shootout intervals.
    output_type: episode_set
    semantic_tier: OBSERVATION
    status: PROPOSED
  - id: canonical_match_clock
    definition: Maps every frame and event to one monotonic match-time reference.
    output_type: frame_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: ball_in_play_state
    definition: Classifies each frame as active play, inactive play, or unknown.
    output_type: enum_signal
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: restart_state
    definition: Classifies the current restart context without yet inferring the tactical routine.
    output_type: enum_signal
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: restart_episode
    definition: Bounds a restart from award/setup through the return to open play.
    output_type: episode_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: score_state
    definition: Returns scoreline and goal difference from each team's perspective.
    output_type: record_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: match_status_state
    definition: Represents leading, level, trailing, and knockout aggregate context.
    output_type: enum_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: remaining_time
    definition: Returns regulation or extra-time remaining under a declared clock policy.
    output_type: frame_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: stoppage_time_state
    definition: Identifies announced or inferred added-time intervals.
    output_type: episode_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: numerical_strength_state
    definition: Returns active-player counts and numerical advantage by team.
    output_type: record_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: pitch_dimensions
    definition: Returns trusted pitch length, width, goal, box, and landmark geometry.
    output_type: geometry_record
    semantic_tier: OBSERVATION
    status: PROPOSED
  - id: attacking_direction
    definition: Returns each team's attacking-axis transform by period.
    output_type: transform_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: competition_context
    definition: Carries competition, season, round, venue, and rule-set metadata.
    output_type: record_value
    semantic_tier: OBSERVATION
    status: PROPOSED
  - id: weather_and_surface_context
    definition: Carries available environmental and surface metadata with provenance.
    output_type: record_value
    semantic_tier: OBSERVATION
    status: PROPOSED
  - id: game_state_window
    definition: Creates an episode where selected score, time, strength, and restart conditions remain stable.
    output_type: episode_set
    semantic_tier: DETERMINISTIC
    status: PROPOSED
- id: entities_and_roles
  title: Entities, availability, roles, and tactical identity
  purpose: Distinguish who exists, who is active, and what role they are occupying at a moment.
  default_modalities:
  - tracking
  - events
  - match_sheet
  capabilities:
  - id: registered_entity
    definition: Returns canonical player, team, referee, ball, and goal identities.
    output_type: entity_set
    semantic_tier: OBSERVATION
    status: PROPOSED
  - id: active_player_timeline
    definition: Returns the authoritative on-pitch interval for every player.
    output_type: relation_episode_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: substitution_episode
    definition: Bounds a player-off/player-on change and its effective match time.
    output_type: episode_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: dismissal_episode
    definition: Bounds a dismissal and updates active-player membership.
    output_type: episode_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: goalkeeper_timeline
    definition: Identifies the acting goalkeeper for each team over time.
    output_type: relation_episode_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: team_membership
    definition: Maps each active entity to a team at each time.
    output_type: relation_signal
    semantic_tier: OBSERVATION
    status: PROPOSED
  - id: provider_position_label
    definition: Preserves declared lineup position without treating it as live tactical role.
    output_type: enum_value
    semantic_tier: OBSERVATION
    status: PROPOSED
  - id: tactical_role_assignment
    definition: Returns probabilistic live roles inferred from location, movement, and team structure.
    output_type: distribution_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: tactical_role_episode
    definition: Bounds intervals in which a player's inferred role remains sufficiently stable.
    output_type: relation_episode_set
    semantic_tier: MODELLED
    status: PROPOSED
  - id: role_change_candidate
    definition: Detects a sustained departure from a player's previous tactical role.
    output_type: anchor_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: role_exchange_candidate
    definition: Detects two teammates exchanging spatial-role responsibilities.
    output_type: relation_episode_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: unit_membership
    definition: Assigns active players to goalkeeper, back, midfield, and forward units with uncertainty.
    output_type: distribution_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: reference_player_set
    definition: Selects entities by team, active status, role, position, or custom predicate.
    output_type: entity_set_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: expected_entity_set
    definition: Returns the entities that should be observable for a declared evaluation.
    output_type: entity_set_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: entity_alias_resolution
    definition: Resolves provider identifiers and names to stable canonical identities.
    output_type: mapping_value
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: entity_visibility_state
    definition: Distinguishes active-but-missing, off-pitch, occluded, and genuinely absent entities.
    output_type: enum_signal
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
- id: ball_control_and_possession
  title: Ball contact, control, contest, and possession
  purpose: Build possession from physical control transitions rather than treating one provider field as ground
    truth.
  default_modalities:
  - tracking
  - events
  capabilities:
  - id: ball_motion_state
    definition: Classifies the ball as stationary, rolling, airborne, rebounding, or uncertain.
    output_type: enum_signal
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: ball_height_state
    definition: Classifies ball height relative to playable body-height bands.
    output_type: enum_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: player_ball_proximity
    definition: Measures player-to-ball distance with positional uncertainty.
    output_type: relation_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: player_ball_reachability
    definition: Estimates whether a player can physically reach the current ball state.
    output_type: relation_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: touch_candidate
    definition: Finds moments consistent with a player materially altering ball motion.
    output_type: anchor_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: contact_candidate
    definition: Finds possible player-ball contact without requiring a material trajectory change.
    output_type: anchor_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: control_gain_candidate
    definition: Finds moments when a player likely establishes controllable possession.
    output_type: anchor_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: control_loss_candidate
    definition: Finds moments when a player likely loses controllable possession.
    output_type: anchor_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: player_control_state
    definition: Returns the most plausible controlling player, alternatives, and confidence per frame.
    output_type: distribution_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: player_control_episode
    definition: Bounds sustained player control with tolerant handling of brief tracking noise.
    output_type: episode_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: team_control_state
    definition: Returns the controlling team, contested, loose, inactive, or unknown.
    output_type: enum_signal
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: team_possession_episode
    definition: Bounds continuous team possession under an explicit turnover and interruption policy.
    output_type: episode_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: possession_sequence
    definition: Groups connected control episodes into a higher-level attacking possession.
    output_type: sequence_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: loose_ball_episode
    definition: Bounds intervals in which no player has credible control.
    output_type: episode_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: contested_ball_episode
    definition: Bounds intervals in which opponents have overlapping credible control claims.
    output_type: episode_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: duel_for_control_episode
    definition: Identifies a localized contest whose outcome is control acquisition.
    output_type: relation_episode_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: possession_change
    definition: Returns confirmed or candidate transitions in team control.
    output_type: anchor_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: same_possession_relation
    definition: Tests whether two anchors or episodes belong to the same possession sequence.
    output_type: relation_evaluation
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: possession_continuity_score
    definition: Measures confidence that control remained with one team through noisy or contested frames.
    output_type: frame_signal
    semantic_tier: MODELLED
    status: PROPOSED
  - id: provider_possession_comparison
    definition: Compares reconstructed control with the provider's possession field and records disagreement.
    output_type: evaluation_set
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: ball_out_of_bounds_candidate
    definition: Detects the physical boundary crossing associated with the ball leaving play.
    output_type: anchor_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: dead_ball_control_state
    definition: Represents who is entitled to restart while the ball is inactive.
    output_type: enum_signal
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: second_ball_episode
    definition: Bounds the loose or contested interval following an aerial duel, clearance, block, or rebound.
    output_type: episode_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: recovery_of_control
    definition: Identifies a player or team establishing control from a loose or opponent-controlled state.
    output_type: anchor_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
- id: kinematics
  title: Kinematics and trajectory structure
  purpose: Expose continuous movement measurements that richer football behaviors can compose.
  default_modalities:
  - tracking
  capabilities:
  - id: position
    definition: Returns canonical 2D or 3D entity position in a declared reference frame.
    output_type: point_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: velocity
    definition: Returns filtered velocity with method, latency, and uncertainty.
    output_type: vector_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: acceleration
    definition: Returns filtered acceleration with method, latency, and uncertainty.
    output_type: vector_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: speed
    definition: Returns scalar ground speed.
    output_type: frame_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: heading_of_motion
    definition: Returns movement direction when speed is sufficient to define it.
    output_type: angle_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: longitudinal_velocity
    definition: Projects velocity onto a declared attacking or reference axis.
    output_type: frame_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: lateral_velocity
    definition: Projects velocity onto the pitch lateral axis.
    output_type: frame_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: relative_velocity
    definition: Returns one entity's velocity relative to another entity or moving reference.
    output_type: vector_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: closing_speed
    definition: Measures the rate at which two entities or an entity and region are approaching.
    output_type: frame_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: separation_speed
    definition: Measures the rate at which two entities are moving apart.
    output_type: frame_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: path_length
    definition: Measures distance traveled over an interval.
    output_type: scalar_value
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: net_displacement
    definition: Measures start-to-end displacement over an interval.
    output_type: vector_value
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: trajectory_curvature
    definition: Measures how strongly a trajectory bends over time.
    output_type: frame_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: turn_rate
    definition: Measures the rate of change of movement heading.
    output_type: frame_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: jerk
    definition: Measures the rate of change of acceleration.
    output_type: vector_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: movement_onset
    definition: Finds transition from stationary/low-speed to purposeful movement.
    output_type: anchor_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: movement_stop
    definition: Finds transition into sustained stationary/low-speed behavior.
    output_type: anchor_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: acceleration_episode
    definition: Bounds sustained positive acceleration above an adaptive baseline.
    output_type: episode_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: deceleration_episode
    definition: Bounds sustained negative acceleration above an adaptive baseline.
    output_type: episode_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: sprint_episode
    definition: Bounds high-speed running under configurable absolute or player-relative thresholds.
    output_type: episode_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: high_intensity_run_episode
    definition: Bounds high-intensity movement without requiring sprint-speed attainment.
    output_type: episode_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: change_of_direction_episode
    definition: Bounds a meaningful directional change with speed-aware confidence.
    output_type: episode_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: trajectory_similarity
    definition: Measures similarity between two trajectories after declared spatial and temporal alignment.
    output_type: scalar_value
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: movement_synchrony
    definition: Measures whether entities accelerate, decelerate, or translate together.
    output_type: relation_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: convergence_relation
    definition: Measures entities moving toward a common target or region.
    output_type: relation_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: divergence_relation
    definition: Measures entities moving away from a common origin or one another.
    output_type: relation_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: trajectory_change_point
    definition: Finds statistically meaningful changes in movement regime.
    output_type: anchor_set
    semantic_tier: MODELLED
    status: PROPOSED
  - id: predicted_short_horizon_trajectory
    definition: Returns a calibrated distribution over near-future positions.
    output_type: trajectory_distribution
    semantic_tier: MODELLED
    status: PROPOSED
- id: geometry
  title: Spatial geometry and topological relations
  purpose: Provide neutral geometric relations that compile many football concepts without hiding tactical assumptions.
  default_modalities:
  - tracking
  - match_sheet
  capabilities:
  - id: distance
    definition: Measures Euclidean or geodesic distance between points, entities, lines, or regions.
    output_type: frame_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: signed_longitudinal_separation
    definition: Measures front-behind separation along a declared attacking axis.
    output_type: frame_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: signed_lateral_separation
    definition: Measures left-right separation in a declared team or pitch frame.
    output_type: frame_signal
    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: bearing
    definition: Returns the angle from one entity or point to another.
