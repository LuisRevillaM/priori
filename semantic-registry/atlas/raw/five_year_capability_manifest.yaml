    semantic_tier: DETERMINISTIC
    status: PROPOSED
  - id: penetration_depth
    definition: Measures how far an action ends beyond the crossed unit or line.
    output_type: scalar_value
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: penetration_retention
    definition: Tests whether the team retains control for a declared time after penetration.
    output_type: evaluation_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: penetration_support_response
