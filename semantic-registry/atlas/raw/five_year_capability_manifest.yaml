    definition: Counts distinct opposition units crossed by an action.
    output_type: scalar_value
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: line_break_receiver_state
    definition: Summarizes receiver control, pressure, support, direction, and local numbers after the break.
    output_type: record_value
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: line_recovery_after_break
    definition: Measures how quickly the broken unit regains goal-side structure.
