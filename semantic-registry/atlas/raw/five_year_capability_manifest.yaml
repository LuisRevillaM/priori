  default_modalities:
  - tracking
  - events
  capabilities:
  - id: relative_position_to_unit
    definition: Measures an actor or ball relative to a selected opposition unit.
    output_type: relation_signal
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: relative_position_to_line
    definition: Measures signed distance and lateral projection relative to an inferred line.
    output_type: relation_signal
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: ball_crosses_unit
    definition: Finds the ball moving from in front of to beyond a selected opposition unit.
    output_type: relation_episode_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
  - id: player_crosses_unit
    definition: Finds a player trajectory crossing a selected opposition unit.
    output_type: relation_episode_set
    semantic_tier: INFERRED_CANDIDATE
    status: PROPOSED
