definition_profiles:
  - id: profile.high_bypass_default.v1
    kind: DefinitionProfile
    display_name: High-Bypass Default Profile
    description: Default high-bypass completed pass profile using forward progression and opponent-count thresholds.
    operationalization_ref: op.release_reception_opponent_transition_count.v1
    bindings:
      minimum_forward_progression_m: 8.0
      minimum_bypassed_opponents: 5
      goalkeeper_policy: exclude_goalkeepers
    claim_contract_ref: claim.high_bypass_completed_pass.v1
    evidence_contract_ref: evidence.high_bypass_completed_pass.v1

  - id: profile.line_break_support_response_default.v1
    kind: DefinitionProfile
    display_name: Line-Break Support Response Default Profile
    description: Default experimental profile requiring a controlled pass over a supplied observed line, at least one observed support arrival, three occupied attacking lanes, and a non-negative local-number difference.
    operationalization_ref: op.controlled_pass_crosses_observed_line.v1
    bindings:
      goal_side_buffer_m: 1.0
      line_band_width_m: 2.0
      minimum_line_defenders: 4
      line_buffer_m: 0.5
      maximum_arrival_seconds: 2.0
      minimum_duration_seconds: 0.4
      maximum_support_distance_m: 8.0
      minimum_supporting_players: 1
      required_occupied_lane_count: 3
      local_radius_m: 12.0
      local_minimum_difference: 0
      local_minimum_perspective_players: 1
      local_maximum_defending_players: 99
    claim_contract_ref: claim.line_break_support_response.v1
    evidence_contract_ref: evidence.line_break_support_response.v1

  - id: profile.first_time_relay_after_receiver_line_transition_default.v1
    kind: DefinitionProfile
    display_name: First-Time Relay After Receiver Line Transition Default Profile
    description: Default experimental profile for event-linked first-time relay after receiver-line transition.
    operationalization_ref: op.event_linked_one_touch_relay.v1
    bindings:
      relay_max_event_gap_seconds: 3.0
      relay_touch_distance_m: 2.75
      maximum_relay_dwell_seconds: 0.56
      goal_side_buffer_m: 1.0
      line_band_width_m: 2.0
      minimum_line_defenders: 4
      line_buffer_m: 0.5
    claim_contract_ref: claim.first_time_relay_after_receiver_line_transition.v1
    evidence_contract_ref: evidence.first_time_relay_after_receiver_line_transition.v1

  - id: profile.ball_side_block_shift_reviewed.v1
    kind: DefinitionProfile
    display_name: Ball-Side Block Shift Reviewed Profile
    description: Reviewed profile for the ball-side block-shift recipe.
    operationalization_ref: op.baseline_relative_defensive_shift.v1
    bindings:
      requires_wide_entry: true
      requires_persistence: true
      classifier: reviewed_plan_only
    claim_contract_ref: claim.ball_side_block_shift.v1
    evidence_contract_ref: evidence.ball_side_block_shift.v1

  - id: profile.progressive_corridor_default.v1
    kind: DefinitionProfile
    display_name: Progressive Corridor Default Profile
    description: Default geometric progressive corridor profile for possession anchors.
    operationalization_ref: op.geometric_progressive_corridor_anchor_set.v1
    bindings:
      claim_pass_probability: false
