operator_definitions:
  - id: operator.gt.1_0_0
    kind: OperatorDefinition
    display_name: Greater Than
    description: Strict lower-bound numeric comparison.
    operator_id: gt
    operator_version: 1.0.0
    input: {container: FrameSignal, value: Scalar, unit: any, nullable: true}
    output: {container: FrameSignal, value: Boolean, unit: none, nullable: true}
    compare: {container: Scalar, value: Scalar, unit: any, nullable: false}
    authorability: ALLOWED
  - id: operator.gte.1_0_0
    kind: OperatorDefinition
    display_name: Greater Than Or Equal
    description: Inclusive lower-bound numeric comparison.
    operator_id: gte
    operator_version: 1.0.0
    input: {container: FrameSignal, value: Scalar, unit: any, nullable: true}
    output: {container: FrameSignal, value: Boolean, unit: none, nullable: true}
    compare: {container: Scalar, value: Scalar, unit: any, nullable: false}
    authorability: ALLOWED
  - id: operator.lte.1_0_0
    kind: OperatorDefinition
    display_name: Less Than Or Equal
    description: Inclusive upper-bound numeric comparison.
    operator_id: lte
    operator_version: 1.0.0
    input: {container: FrameSignal, value: Scalar, unit: any, nullable: true}
    output: {container: FrameSignal, value: Boolean, unit: none, nullable: true}
    compare: {container: Scalar, value: Scalar, unit: any, nullable: false}
    authorability: ALLOWED
  - id: operator.eq.1_0_0
    kind: OperatorDefinition
    display_name: Equal
    description: Typed equality comparison.
    operator_id: eq
    operator_version: 1.0.0
    input: {container: FrameSignal, value: Any, unit: none, nullable: true}
    output: {container: FrameSignal, value: Boolean, unit: none, nullable: true}
    compare: {container: Scalar, value: Any, unit: none, nullable: false}
    authorability: ALLOWED
  - id: operator.neq.1_0_0
    kind: OperatorDefinition
    display_name: Not Equal
    description: Typed non-equality comparison.
    operator_id: neq
    operator_version: 1.0.0
    input: {container: FrameSignal, value: Any, unit: none, nullable: true}
    output: {container: FrameSignal, value: Boolean, unit: none, nullable: true}
    compare: {container: Scalar, value: Any, unit: none, nullable: false}
    authorability: ALLOWED
  - id: operator.persists_for.1_0_0
    kind: OperatorDefinition
    display_name: Persists For
    description: Promote a Boolean frame signal to intervals after a minimum duration.
    operator_id: persists_for
    operator_version: 1.0.0
    input: {container: FrameSignal, value: Boolean, unit: none, nullable: true}
    output: {container: EpisodeSet, value: Boolean, unit: none, nullable: true}
    parameters:
      - name: duration
        type: {container: Scalar, value: Scalar, unit: second, nullable: false}
        required: true
        description: Minimum persistence duration.
    unknown_semantics:
      gaps_do_not_become_false: true
      unknown_does_not_bridge_intervals: true
    authorability: ALLOWED
  - id: operator.exists.1_0_0
    kind: OperatorDefinition
    display_name: Exists
    description: Test whether an anchor-relative Boolean episode or relation collection exists.
    operator_id: exists
    operator_version: 1.0.0
    input: {container: EpisodeSet, value: Boolean, unit: none, nullable: true}
    output: {container: FrameSignal, value: Boolean, unit: none, nullable: true}
    unknown_semantics:
      missing_anchor_evaluation_remains_unknown: true
    authorability: ALLOWED
  - id: operator.count_at_least.1_0_0
    kind: OperatorDefinition
    display_name: Count At Least
    description: Count a Boolean or entity collection and compare to a count threshold.
    operator_id: count_at_least
    operator_version: 1.0.0
    input: {container: EpisodeSet, value: Boolean, unit: none, nullable: true}
    output: {container: FrameSignal, value: Boolean, unit: none, nullable: true}
    compare: {container: Scalar, value: Scalar, unit: count, nullable: false}
    unknown_semantics:
      missing_coverage_may_change_count: true
    authorability: ALLOWED

claim_contracts:
  - id: claim.possession_context.v1
    kind: ClaimContract
    display_name: Possession Context Claims
    description: Claims permitted for possession interval and anchor outputs.
    permitted: [team_active_ball_possession_interval_identified, possession_anchor_identified]
    prohibited: [proves_possession_intent, proves_best_action]
    unknown_conditions: [ball_control_unresolved, possession_boundary_unresolved]
  - id: claim.controlled_ball_transfer.v1
    kind: ClaimContract
    display_name: Controlled Ball Transfer Claims
    description: Claims permitted for event-seeded tracking-confirmed completed pass episodes.
    permitted: [event_candidate_pass_identified, tracking_confirmed_physical_release, tracking_confirmed_controlled_reception]
    prohibited: [proves_passer_intent, proves_pass_optimality, proves_pass_probability]
    unknown_conditions: [physical_release_unresolved, controlled_reception_unresolved, possession_continuity_unresolved]
  - id: claim.wide_ball_entry.v1
    kind: ClaimContract
    display_name: Wide Ball Entry Claims
    description: Claims permitted for ball lateral-position measurements.
    permitted: [ball_lateral_position_measured, configured_wide_area_entry_measured]
    prohibited: [proves_tactical_intent, proves_space_was_available]
    unknown_conditions: [ball_position_missing, pitch_width_unknown]
  - id: claim.defensive_outfield_centroid.v1
    kind: ClaimContract
    display_name: Defensive Outfield Centroid Claims
    description: Claims permitted for defending outfield centroid measurements.
    permitted: [defending_outfield_centroid_measured]
    prohibited: [proves_defender_intent, proves_marking_assignment]
    unknown_conditions: [defending_player_positions_missing, goalkeeper_identity_unresolved]
  - id: claim.observed_geometric_defensive_line.v1
    kind: ClaimContract
    display_name: Observed Geometric Defensive Line Claims
    description: Claims permitted for the observed geometric defensive-line model.
    permitted: [observed_geometric_defensive_line_fit_under_declared_thresholds, no_qualifying_geometric_defensive_line_observed_when_evidence_complete]
    prohibited: [tactical_line_role_identified, defensive_line_was_broken, defender_intent_inferred, pass_was_optimal, passer_intended_measured_outcome]
    unknown_conditions: [ball_position_missing, attacking_direction_missing_or_invalid, defending_outfield_positions_incomplete, ambiguous_candidate_lines]
  - id: claim.relative_position_to_observed_line.v1
    kind: ClaimContract
    display_name: Relative Position To Observed Line Claims
    description: Claims permitted for relative-position-to-line measurements.
    permitted: [entity_position_classified_relative_to_supplied_line_under_declared_buffer]
    prohibited: [defensive_line_was_broken, tactical_line_role_identified, player_intent_inferred, pass_was_optimal, passer_intended_measured_outcome]
    unknown_conditions: [line_position_missing, entity_position_missing, attacking_direction_missing_or_invalid, anchor_correlation_missing]
  - id: claim.controlled_pass_crosses_observed_line.v1
    kind: ClaimContract
    display_name: Controlled Pass Crosses Observed Line Claims
    description: Claims permitted for controlled-pass crossing of a supplied observed line.
    inherits: [claim.controlled_ball_transfer.v1, claim.observed_geometric_defensive_line.v1, claim.relative_position_to_observed_line.v1]
    permitted: [controlled_pass_crossed_supplied_observed_line_under_declared_buffer]
    prohibited: [tactical_line_role_identified, defensive_line_was_broken, line_break_caused_by_pass, player_intent_inferred, pass_was_optimal, passer_intended_measured_outcome]
    unknown_conditions: [controlled_pass_evidence_missing, line_evidence_missing, release_relative_position_missing, reception_relative_position_missing, anchor_correlation_missing]
  - id: claim.one_touch_relay.v1
    kind: ClaimContract
    display_name: One-Touch Relay Claims
    description: Claims permitted for event-linked one-touch relay measurements.
    inherits: [claim.controlled_ball_transfer.v1]
    permitted: [event_linked_first_time_relay_observed_under_declared_thresholds]
    prohibited: [planned_combination_inferred, third_man_combination_claimed, player_intent_inferred, pass_was_optimal, pass_probability_inferred, decision_quality_inferred, pass_crossed_line_claimed]
    unknown_conditions: [event_linkage_missing, input_release_unknown, relay_touch_tracking_missing, relay_release_unknown]
  - id: claim.receiver_line_transition_during_pass_leg.v1
    kind: ClaimContract
    display_name: Receiver Line Transition During Pass Leg Claims
    description: Claims permitted for receiver/relay-player position transition relative to a supplied observed line.
    inherits: [claim.observed_geometric_defensive_line.v1, claim.relative_position_to_observed_line.v1]
    permitted: [receiver_player_transitioned_beyond_supplied_observed_line]
    prohibited: [pass_crossed_line_claimed, defensive_line_was_broken, tactical_line_role_identified, line_break_caused_by_pass, player_intent_inferred, pass_was_optimal, pass_probability_inferred, decision_quality_inferred]
    unknown_conditions: [relay_evidence_missing, line_evidence_missing, release_relative_position_missing, relay_relative_position_missing, anchor_correlation_missing]
  - id: claim.pass_chain_episode.v1
    kind: ClaimContract
    display_name: Pass Chain Episode Claims
    description: Claims permitted for connected relay plus terminal controlled reception.
