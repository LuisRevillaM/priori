  - id: impl.relation_destination_entry_classification.python.v1
    kind: Implementation
    display_name: Relation Destination Entry Classification Python Implementation
    description: Current reviewed-plan-only destination-entry classification implementation.
    implements: [op.reviewed_relation_destination_entry_classification.v1]
    source_refs: [src/tqe/runtime/executor.py, src/tqe/runtime/catalog.py]
  - id: impl.geometric_progressive_corridor.python.v1
    kind: Implementation
    display_name: Geometric Progressive Corridor Python Implementation
    description: Current progressive corridor relation implementation.
    implements: [op.geometric_progressive_corridor.v1]
    source_refs: [src/tqe/runtime/relations.py, src/tqe/runtime/catalog.py]
  - id: impl.geometric_progressive_corridor_anchor_set.python.v1
    kind: Implementation
    display_name: Geometric Progressive Corridor Anchor Set Python Implementation
