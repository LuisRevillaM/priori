    implements: [op.relative_position_to_observed_line.v1]
    source_refs: [src/tqe/runtime/relative_position_to_line.py, src/tqe/runtime/executor.py, src/tqe/runtime/catalog.py]
  - id: impl.signed_lateral_shift.python.v1
    kind: Implementation
    display_name: Signed Lateral Shift Python Implementation
