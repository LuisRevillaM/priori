  - id: impl.controlled_pass_episode.python.v1
    kind: Implementation
    display_name: Controlled Pass Episode Python Implementation
    description: Current event-seeded tracking-confirmed pass implementation.
    implements: [op.event_seeded_tracking_confirmed_pass.v1]
    source_refs: [src/tqe/runtime/executor.py, src/tqe/runtime/catalog.py, src/tqe/runtime/pass_bypass.py]
