schema_version: "1.0"
registry_id: priori.semantic_registry.scp0
registry_version: 0.1.0

concepts:
  - id: concept.possession_context
    kind: Concept
    display_name: Possession Context
    description: Active-ball possession intervals and anchors for a perspective team.
    claim_contract_ref: claim.possession_context.v1
    evidence_contract_ref: evidence.possession_context.v1
    tags: [possession, anchor]

  - id: concept.controlled_ball_transfer
    kind: Concept
    display_name: Controlled Ball Transfer
    description: The ball moves from one player to a teammate and the teammate gains controlled possession.
    claim_contract_ref: claim.controlled_ball_transfer.v1
    evidence_contract_ref: evidence.controlled_ball_transfer.v1
    tags: [pass, control, event_tracking_alignment]

  - id: concept.normalized_ball_lateral_position
    kind: Concept
    display_name: Normalized Ball Lateral Position
    description: The ball's lateral position normalized against the pitch centerline and touchline distance.
    claim_contract_ref: claim.wide_ball_entry.v1
    evidence_contract_ref: evidence.wide_ball_entry.v1
    tags: [width, ball_position, measurement]

  - id: concept.defensive_outfield_centroid
    kind: Concept
    display_name: Defensive Outfield Centroid
    description: The aggregate position of defending outfield players, excluding the goalkeeper.
    claim_contract_ref: claim.defensive_outfield_centroid.v1
    evidence_contract_ref: evidence.defensive_outfield_centroid.v1
    tags: [defending, shape]

  - id: concept.observed_geometric_defensive_line
    kind: Concept
    display_name: Observed Geometric Defensive Line
    description: A compact band of defending outfield players goal-side of the ball under declared geometric thresholds.
    claim_contract_ref: claim.observed_geometric_defensive_line.v1
    evidence_contract_ref: evidence.observed_geometric_defensive_line.v1
    tags: [defending, line, geometry]

  - id: concept.relative_position_to_observed_line
    kind: Concept
    display_name: Relative Position To Observed Line
    description: An entity's observed position classified ahead of, behind, or level with a supplied geometric line.
    claim_contract_ref: claim.relative_position_to_observed_line.v1
    evidence_contract_ref: evidence.relative_position_to_observed_line.v1
    tags: [line, geometry, relative_position]

  - id: concept.controlled_pass_crosses_observed_line
    kind: Concept
    display_name: Controlled Pass Crosses Observed Line
    description: A controlled pass whose receiver moves from not-yet-beyond a supplied observed line to beyond it.
    claim_contract_ref: claim.controlled_pass_crosses_observed_line.v1
    evidence_contract_ref: evidence.controlled_pass_crosses_observed_line.v1
    tags: [pass, line, geometry, controlled_reception]

  - id: concept.one_touch_relay
    kind: Concept
    display_name: One-Touch Relay
    description: Event-linked first-time relay where the input receiver immediately plays an onward completed pass under declared tracking thresholds.
    claim_contract_ref: claim.one_touch_relay.v1
    evidence_contract_ref: evidence.one_touch_relay.v1
    tags: [pass, relay, event_tracking_alignment]

  - id: concept.receiver_line_transition_during_pass_leg
    kind: Concept
    display_name: Receiver Line Transition During Pass Leg
    description: The receiving or relay actor moves from not beyond to beyond a supplied observed line between input release and relay touch.
    claim_contract_ref: claim.receiver_line_transition_during_pass_leg.v1
    evidence_contract_ref: evidence.receiver_line_transition_during_pass_leg.v1
    tags: [line, receiver, geometry, relay]

  - id: concept.pass_chain_episode
    kind: Concept
    display_name: Pass Chain Episode
    description: A connected event-linked input pass, relay pass, and terminal controlled reception.
    claim_contract_ref: claim.pass_chain_episode.v1
    evidence_contract_ref: evidence.pass_chain_episode.v1
    tags: [pass, chain, relay, controlled_reception]

  - id: concept.provider_action_event_anchor
    kind: Concept
    display_name: Provider Action Event Anchor
    description: Provider event rows aligned to nearest tracking frames as typed action anchors.
    claim_contract_ref: claim.provider_action_event_anchor.v1
    evidence_contract_ref: evidence.provider_action_event_anchor.v1
    tags: [events, anchor, action]

  - id: concept.action_chain
    kind: Concept
    display_name: Action Chain
    description: Ordered same-team provider action anchors connected inside declared event-time gaps.
    claim_contract_ref: claim.action_chain.v1
    evidence_contract_ref: evidence.action_chain.v1
    tags: [events, chain, action]

  - id: concept.tracking_quality
    kind: Concept
    display_name: Tracking Quality
    description: Availability of ball and declared entity coordinates at an anchor-relative frame.
    claim_contract_ref: claim.tracking_quality.v1
    evidence_contract_ref: evidence.tracking_quality.v1
    tags: [tracking, quality, coverage]

  - id: concept.pairwise_distance
    kind: Concept
    display_name: Pairwise Distance
    description: Observed geometric distance between two anchor-relative entities, or an entity and the ball.
    claim_contract_ref: claim.pairwise_distance.v1
    evidence_contract_ref: evidence.pairwise_distance.v1
    tags: [distance, geometry, measurement]

  - id: concept.observed_entity_velocity
    kind: Concept
    display_name: Observed Entity Velocity
    description: Displacement-derived velocity for an observed entity around an anchor-relative frame.
    claim_contract_ref: claim.observed_entity_velocity.v1
    evidence_contract_ref: evidence.observed_entity_velocity.v1
    tags: [velocity, tracking, movement]

  - id: concept.observed_multi_line_model
    kind: Concept
    display_name: Observed Multi-Line Model
    description: Ranked observed geometric defending line bands at supplied anchor frames.
    claim_contract_ref: claim.observed_multi_line_model.v1
    evidence_contract_ref: evidence.observed_multi_line_model.v1
    tags: [defending, lines, geometry]

  - id: concept.observed_pressure_on_carrier
    kind: Concept
    display_name: Observed Pressure On Carrier
    description: Nearest-defender pressure on a carrier under declared distance, closing-speed, approach-angle, duration, and coverage thresholds.
    claim_contract_ref: claim.observed_pressure_on_carrier.v1
    evidence_contract_ref: evidence.observed_pressure_on_carrier.v1
    tags: [pressure, defending, relation, movement]

  - id: concept.observed_team_compactness
    kind: Concept
    display_name: Observed Team Compactness
    description: Observed team width and depth measured from outfield tracking positions at an anchor-relative frame.
    claim_contract_ref: claim.observed_team_compactness.v1
    evidence_contract_ref: evidence.observed_team_compactness.v1
    tags: [shape, compactness, tracking]

  - id: concept.observed_switch_of_play
    kind: Concept
    display_name: Observed Switch Of Play
    description: Observed controlled-pass ball transfer from one lateral side to the opposite side under declared endpoint thresholds.
    claim_contract_ref: claim.observed_switch_of_play.v1
    evidence_contract_ref: evidence.observed_switch_of_play.v1
    tags: [switch, pass, width, tracking]

  - id: concept.observed_change_across_anchor
    kind: Concept
    display_name: Observed Change Across Anchor
    description: Before-versus-after numeric evidence comparison for the same anchor under declared change thresholds.
    claim_contract_ref: claim.observed_change_across_anchor.v1
    evidence_contract_ref: evidence.observed_change_across_anchor.v1
    tags: [change, temporal, comparison]

  - id: concept.observed_lane_occupancy
    kind: Concept
    display_name: Observed Lane Occupancy
    description: Observed outfield player positions classified into declared lateral pitch lanes at an anchor-relative frame.
    claim_contract_ref: claim.observed_lane_occupancy.v1
    evidence_contract_ref: evidence.observed_lane_occupancy.v1
    tags: [lanes, shape, geometry]

  - id: concept.observed_support_arrival
    kind: Concept
    display_name: Observed Support Arrival
    description: Observed candidate teammates entering a declared geometric support region around an anchor reference point within a declared time window.
    claim_contract_ref: claim.observed_support_arrival.v1
    evidence_contract_ref: evidence.observed_support_arrival.v1
    tags: [support, relation, geometry, timing]

  - id: concept.observed_local_number_relation
    kind: Concept
    display_name: Observed Local Number Relation
    description: Observed perspective-versus-defending player counts inside a declared local region around an anchor reference point.
    claim_contract_ref: claim.observed_local_number_relation.v1
    evidence_contract_ref: evidence.observed_local_number_relation.v1
    tags: [numbers, relation, geometry, local-context]

  - id: concept.line_break_support_response
    kind: Concept
    display_name: Line-Break Support Response
    description: A composed experimental tactic combining observed controlled line crossing, support arrival, lane occupancy, and local-number context.
    claim_contract_ref: claim.line_break_support_response.v1
    evidence_contract_ref: evidence.line_break_support_response.v1
    tags: [line, support, lanes, local-context, composition, recipe]

  - id: concept.first_time_relay_after_receiver_line_transition
    kind: Concept
    display_name: First-Time Relay After Receiver Line Transition
    description: A composed experimental tactic combining an event-linked one-touch relay, receiver line transition, and terminal controlled reception.
    claim_contract_ref: claim.first_time_relay_after_receiver_line_transition.v1
    evidence_contract_ref: evidence.first_time_relay_after_receiver_line_transition.v1
    tags: [relay, line, pass_chain, composition, recipe]

  - id: concept.defensive_block_lateral_shift
    kind: Concept
    display_name: Defensive Block Lateral Shift
    description: Baseline-relative lateral movement of a defending outfield block toward the ball side.
    claim_contract_ref: claim.defensive_block_lateral_shift.v1
    evidence_contract_ref: evidence.defensive_block_lateral_shift.v1
    tags: [defending, block_shift]

  - id: concept.reviewed_outcome_classification
    kind: Concept
    display_name: Reviewed Outcome Classification
    description: A saved-plan classification rule whose assumptions are controlled by a reviewed tactical recipe.
    claim_contract_ref: claim.reviewed_outcome_classification.v1
    evidence_contract_ref: evidence.reviewed_outcome_classification.v1
    tags: [classification, reviewed_plan_only]

  - id: concept.progressive_connection_availability
    kind: Concept
    display_name: Progressive Connection Availability
    description: A geometrically clear forward connection from the ball or anchor to a teammate.
    claim_contract_ref: claim.progressive_connection_availability.v1
    evidence_contract_ref: evidence.progressive_connection_availability.v1
    tags: [corridor, progression, relation]

  - id: concept.relation_destination_entry
    kind: Concept
    display_name: Relation Destination Entry
    description: Ball entry into the destination region defined by a relation episode within a declared window.
    claim_contract_ref: claim.relation_destination_entry.v1
    evidence_contract_ref: evidence.relation_destination_entry.v1
    tags: [destination_entry, relation, temporal]

  - id: concept.opponent_ball_side_transition_count
    kind: Concept
    display_name: Opponent Ball-Side Transition Count
    description: Count of opposition outfield players whose position relative to the ball changes between action endpoints.
    claim_contract_ref: claim.opponent_ball_side_transition_count.v1
    evidence_contract_ref: evidence.opponent_ball_side_transition_count.v1
    tags: [bypass, action, count]

  - id: concept.high_bypass_completed_pass
    kind: Concept
    display_name: High-Bypass Completed Pass
    description: A controlled completed pass with sufficient forward progression and opponent bypass count.
    claim_contract_ref: claim.high_bypass_completed_pass.v1
    evidence_contract_ref: evidence.high_bypass_completed_pass.v1
    tags: [bypass, pass, recipe]

  - id: concept.ball_side_block_shift
    kind: Concept
    display_name: Ball-Side Block Shift
    description: A reviewed ball-side entry and defensive block-shift pattern with saved-plan outcome classification.
    claim_contract_ref: claim.ball_side_block_shift.v1
    evidence_contract_ref: evidence.ball_side_block_shift.v1
    tags: [block_shift, recipe, reviewed]

  - id: concept.progressive_connection_followed_by_destination_entry
    kind: Concept
    display_name: Progressive Connection Followed By Destination Entry
    description: A possession anchor has a progressive connection relation and the ball is evaluated for later entry into that relation's destination region.
    claim_contract_ref: claim.ai_corridor_destination_composition.v1
    evidence_contract_ref: evidence.ai_corridor_destination_composition.v1
    tags: [corridor, destination_entry, composition]
  - id: concept.opposite_corridor_after_shift
    kind: Concept
    display_name: Opposite Corridor After Shift
    description: A ball-side block-shift context followed by a progressive corridor and destination-entry evaluation on the opposite-side relation.
    claim_contract_ref: claim.opposite_corridor_after_shift.v1
    evidence_contract_ref: evidence.opposite_corridor_after_shift.v1
    tags: [corridor, block_shift, destination_entry, recipe]

operationalizations:
  - id: op.possession_segment_intervals.v1
    kind: Operationalization
    display_name: Possession Segment Intervals
    description: Identify active-ball possession intervals and anchors for the perspective team.
    concept_refs: [concept.possession_context]
    semantic_basis: INFERRED_CANDIDATE
    required_modalities: [tracking, events]
    applicability: [ball_in_play_candidate, perspective_team_known]
    inputs:
      - name: canonical_match_state
        type: {container: WorldState, value: MatchState, unit: none}
    outputs:
      - name: episodes
        type: {container: EpisodeSet, value: Boolean, quantity: possession, unit: none, entity_scope: possession}
      - name: anchors
        type: {container: EpisodeSet, value: AnchorRef, quantity: possession_anchor, unit: none, entity_scope: anchor}
    lowering: [team_control_candidates, possession_episode_extraction]
    claim_contract_ref: claim.possession_context.v1
    evidence_contract_ref: evidence.possession_context.v1

  - id: op.event_seeded_tracking_confirmed_pass.v1
    kind: Operationalization
    display_name: Event-Seeded Tracking-Confirmed Pass
    description: Use event data to find candidate completed passes, then tracking data to confirm physical release and controlled reception.
    concept_refs: [concept.controlled_ball_transfer]
    semantic_basis: INFERRED_CANDIDATE
    required_modalities: [events, tracking]
    applicability: [candidate_pass_event, tracking_available_around_event]
    inputs:
      - name: candidate_pass_events
        type: {container: EventSet, value: ProviderEvent, unit: none}
      - name: tracking_window
        type: {container: TrajectorySet, value: Position, unit: metre, coordinate_frame: pitch_absolute}
    outputs:
      - name: controlled_pass_status
        type: {container: FrameSignal, value: Enum, quantity: controlled_pass_status, unit: none, entity_scope: possession}
      - name: forward_progression_m
        type: {container: FrameSignal, value: Scalar, quantity: forward_progression, unit: metre, entity_scope: possession}
      - name: anchors
        type: {container: EpisodeSet, value: AnchorRef, quantity: controlled_pass_anchor, unit: none, entity_scope: anchor}
    lowering: [event_tracking_alignment_candidate, physical_ball_release, physical_ball_reception, possession_continuity]
    claim_contract_ref: claim.controlled_ball_transfer.v1
    evidence_contract_ref: evidence.controlled_ball_transfer.v1

  - id: op.ball_lateral_fraction.v1
    kind: Operationalization
    display_name: Ball Lateral Fraction
    description: Normalize ball distance from pitch centerline toward either touchline.
    concept_refs: [concept.normalized_ball_lateral_position]
    semantic_basis: DETERMINISTIC
    required_modalities: [tracking]
    applicability: [ball_position_available, pitch_width_known]
    inputs:
      - name: ball_position
        type: {container: PointSignal, value: Point, unit: metre, coordinate_frame: pitch_absolute, entity_scope: ball}
    outputs:
      - name: fraction
        type: {container: FrameSignal, value: Scalar, quantity: pitch_width_fraction, unit: fraction, entity_scope: ball}
    lowering: [coordinate_transform, normalized_lateral_position]
    claim_contract_ref: claim.wide_ball_entry.v1
    evidence_contract_ref: evidence.wide_ball_entry.v1

  - id: op.defensive_outfield_centroid.v1
    kind: Operationalization
    display_name: Defensive Outfield Centroid
    description: Measure defending outfield team centroid without goalkeeper bias.
    concept_refs: [concept.defensive_outfield_centroid]
    semantic_basis: DETERMINISTIC
    required_modalities: [tracking]
    applicability: [defending_team_known, outfield_player_set_available]
    inputs:
      - name: defending_outfield_positions
        type: {container: EntitySetSignal, value: Point, unit: metre, coordinate_frame: pitch_absolute, entity_scope: team}
    outputs:
      - name: centroid_y
        type: {container: FrameSignal, value: Scalar, quantity: lateral_position, unit: metre, cardinality: per_team, entity_scope: team}
    lowering: [reference_player_set, centroid]
    claim_contract_ref: claim.defensive_outfield_centroid.v1
    evidence_contract_ref: evidence.defensive_outfield_centroid.v1

  - id: op.observed_geometric_defensive_line.v1
    kind: Operationalization
    display_name: Observed Geometric Defensive Line
    description: Fit a compact goal-side band of defending outfield players at supplied anchor frames.
    concept_refs: [concept.observed_geometric_defensive_line]
    semantic_basis: DETERMINISTIC
    required_modalities: [tracking]
    applicability: [anchor_available, ball_position_available, defending_outfield_positions_available]
    inputs:
      - name: anchors
        type: {container: EpisodeSet, value: AnchorRef, quantity: anchor, unit: none, entity_scope: anchor}
      - name: ball_position
        type: {container: PointSignal, value: Point, unit: metre, coordinate_frame: pitch_absolute, entity_scope: ball}
      - name: defending_outfield_positions
        type: {container: EntitySetSignal, value: Point, unit: metre, coordinate_frame: pitch_absolute, entity_scope: team}
    outputs:
      - name: anchor_evaluations
        type: {container: EpisodeSet, value: AnchorRef, quantity: defensive_line_evaluation, unit: none, entity_scope: anchor}
      - name: line_status
        type: {container: FrameSignal, value: Enum, quantity: observed_defensive_line_status, unit: none, entity_scope: anchor}
    lowering: [attacking_direction_normalization, goal_side_filter, compact_x_band_selection, ambiguity_detection]
    claim_contract_ref: claim.observed_geometric_defensive_line.v1
    evidence_contract_ref: evidence.observed_geometric_defensive_line.v1

  - id: op.relative_position_to_observed_line.v1
    kind: Operationalization
    display_name: Relative Position To Observed Line
    description: Classify an entity's tracking position relative to a supplied observed line at a declared frame.
    concept_refs: [concept.relative_position_to_observed_line]
    semantic_basis: DETERMINISTIC
    required_modalities: [tracking]
    applicability: [line_evaluation_available, entity_anchor_available, entity_tracking_available]
    inputs:
      - name: line_evaluations
        type: {container: EpisodeSet, value: AnchorRef, quantity: defensive_line_evaluation, unit: none, entity_scope: anchor}
      - name: entity_anchors
        type: {container: EpisodeSet, value: AnchorRef, quantity: entity_anchor, unit: none, entity_scope: anchor}
      - name: tracking_window
        type: {container: TrajectorySet, value: Position, unit: metre, coordinate_frame: pitch_absolute}
    outputs:
      - name: anchor_evaluations
        type: {container: EpisodeSet, value: AnchorRef, quantity: relative_position_to_line_evaluation, unit: none, entity_scope: anchor}
      - name: relative_position_status
        type: {container: FrameSignal, value: Enum, quantity: relative_position_to_line_status, unit: none, entity_scope: anchor}
    lowering: [anchor_id_alignment, entity_position_lookup, attacking_direction_normalization, line_relative_position_classification]
    claim_contract_ref: claim.relative_position_to_observed_line.v1
    evidence_contract_ref: evidence.relative_position_to_observed_line.v1

  - id: op.controlled_pass_crosses_observed_line.v1
    kind: Operationalization
    display_name: Controlled Pass Crosses Observed Line
    description: Evaluate whether a tracking-confirmed completed pass carried its receiver across a supplied observed line.
    concept_refs: [concept.controlled_pass_crosses_observed_line]
    semantic_basis: DETERMINISTIC
    required_modalities: [events, tracking]
    applicability: [controlled_pass_available, observed_line_available, release_relative_position_available, reception_relative_position_available]
    inputs:
      - name: controlled_pass_anchors
        type: {container: EpisodeSet, value: AnchorRef, quantity: controlled_pass_anchor, unit: none, entity_scope: anchor}
      - name: line_evaluations
        type: {container: EpisodeSet, value: AnchorRef, quantity: defensive_line_evaluation, unit: none, entity_scope: anchor}
      - name: release_relative_positions
        type: {container: EpisodeSet, value: AnchorRef, quantity: relative_position_to_line_evaluation, unit: none, entity_scope: anchor}
      - name: reception_relative_positions
        type: {container: EpisodeSet, value: AnchorRef, quantity: relative_position_to_line_evaluation, unit: none, entity_scope: anchor}
    outputs:
      - name: anchor_evaluations
        type: {container: EpisodeSet, value: AnchorRef, quantity: controlled_line_break_evaluation, unit: none, entity_scope: anchor}
      - name: line_break_status
        type: {container: FrameSignal, value: Enum, quantity: controlled_line_break_status, unit: none, entity_scope: anchor}
    lowering: [exact_anchor_alignment, release_side_check, reception_side_check, pass_line_crossing_classification]
    claim_contract_ref: claim.controlled_pass_crosses_observed_line.v1
    evidence_contract_ref: evidence.controlled_pass_crosses_observed_line.v1

  - id: op.event_linked_one_touch_relay.v1
    kind: Operationalization
    display_name: Event-Linked One-Touch Relay
    description: Use adjacent provider pass events and tracking evidence to identify a bounded first-time relay.
    concept_refs: [concept.one_touch_relay]
    semantic_basis: INFERRED_CANDIDATE
    required_modalities: [events, tracking]
    applicability: [adjacent_completed_pass_events, recipient_is_next_passer, tracking_available_around_relay]
    inputs:
      - name: provider_event_stream
        type: {container: EventSet, value: ProviderEvent, unit: none}
      - name: tracking_window
        type: {container: TrajectorySet, value: Position, unit: metre, coordinate_frame: pitch_absolute}
    outputs:
      - name: anchor_evaluations
        type: {container: EpisodeSet, value: AnchorRef, quantity: one_touch_relay_evaluation, unit: none, entity_scope: anchor}
      - name: one_touch_relay_status
        type: {container: FrameSignal, value: Enum, quantity: one_touch_relay_status, unit: none, entity_scope: anchor}
    lowering: [event_linkage, physical_input_release, relay_touch_detection, relay_release_detection, dwell_threshold]
    claim_contract_ref: claim.one_touch_relay.v1
    evidence_contract_ref: evidence.one_touch_relay.v1

  - id: op.receiver_line_transition_during_pass_leg.v1
    kind: Operationalization
    display_name: Receiver Line Transition During Pass Leg
    description: Evaluate whether a relay player moves from not beyond to beyond a supplied observed line between input release and relay touch.
    concept_refs: [concept.receiver_line_transition_during_pass_leg]
    semantic_basis: DETERMINISTIC
    required_modalities: [tracking]
    applicability: [relay_anchor_available, observed_line_available, release_relative_position_available, relay_relative_position_available]
    inputs:
      - name: relay_anchors
        type: {container: EpisodeSet, value: AnchorRef, quantity: one_touch_relay_evaluation, unit: none, entity_scope: anchor}
      - name: line_evaluations
        type: {container: EpisodeSet, value: AnchorRef, quantity: defensive_line_evaluation, unit: none, entity_scope: anchor}
      - name: release_relative_positions
        type: {container: EpisodeSet, value: AnchorRef, quantity: relative_position_to_line_evaluation, unit: none, entity_scope: anchor}
      - name: relay_relative_positions
        type: {container: EpisodeSet, value: AnchorRef, quantity: relative_position_to_line_evaluation, unit: none, entity_scope: anchor}
    outputs:
      - name: anchor_evaluations
        type: {container: EpisodeSet, value: AnchorRef, quantity: receiver_line_transition_evaluation, unit: none, entity_scope: anchor}
      - name: receiver_line_transition_status
        type: {container: FrameSignal, value: Enum, quantity: receiver_line_transition_status, unit: none, entity_scope: anchor}
    lowering: [exact_anchor_alignment, release_side_check, relay_touch_side_check, receiver_position_transition_classification]
    claim_contract_ref: claim.receiver_line_transition_during_pass_leg.v1
    evidence_contract_ref: evidence.receiver_line_transition_during_pass_leg.v1

  - id: op.event_linked_pass_chain_episode.v1
    kind: Operationalization
    display_name: Event-Linked Pass Chain Episode
    description: Join an event-linked relay to terminal controlled reception of the onward pass.
    concept_refs: [concept.pass_chain_episode]
    semantic_basis: INFERRED_CANDIDATE
    required_modalities: [events, tracking]
    applicability: [relay_anchor_available, terminal_controlled_pass_available]
    inputs:
      - name: relay_anchors
        type: {container: EpisodeSet, value: AnchorRef, quantity: one_touch_relay_evaluation, unit: none, entity_scope: anchor}
      - name: terminal_controlled_pass_anchors
        type: {container: EpisodeSet, value: AnchorRef, quantity: controlled_pass_anchor, unit: none, entity_scope: anchor}
    outputs:
      - name: anchor_evaluations
        type: {container: EpisodeSet, value: AnchorRef, quantity: pass_chain_evaluation, unit: none, entity_scope: anchor}
      - name: pass_chain_status
        type: {container: FrameSignal, value: Enum, quantity: pass_chain_status, unit: none, entity_scope: anchor}
    lowering: [relay_pass_id_join, terminal_controlled_reception_check, chain_continuity_check]
    claim_contract_ref: claim.pass_chain_episode.v1
    evidence_contract_ref: evidence.pass_chain_episode.v1

  - id: op.provider_action_event_anchor.v1
    kind: Operationalization
    display_name: Provider Action Event Anchor
    description: Align supported provider action events to nearest tracking frames as action anchors.
    concept_refs: [concept.provider_action_event_anchor]
    semantic_basis: INFERRED_CANDIDATE
    required_modalities: [events, tracking]
    applicability: [provider_event_available, nearest_tracking_frame_available]
    inputs:
      - name: candidate_action_events
        type: {container: EventSet, value: ProviderEvent, unit: none}
    outputs:
      - name: anchor_evaluations
        type: {container: EpisodeSet, value: AnchorRef, quantity: action_event_anchor, unit: none, entity_scope: anchor}
      - name: action_event_status
